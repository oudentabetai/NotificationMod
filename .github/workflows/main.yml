name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - run: git log -n 1

      - name: Get variables
        id: get-variables
        shell: bash
        run: |
          set -euo pipefail

          # tag vX.Y.Z -> version=X.Y.Z
          version="${GITHUB_REF#refs/tags/v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          minecraft_version=$(perl -ne 'if (/^\s*minecraft_version\s*=\s*([0-9.]+)\s*$/) { print $1; exit }' gradle.properties)
          if [[ -z "${minecraft_version:-}" ]]; then
            echo "minecraft_version not found in gradle.properties" >&2
            exit 1
          fi
          echo "minecraft_version=$minecraft_version" >> "$GITHUB_OUTPUT"

          echo "Resolved version=$version, minecraft_version=$minecraft_version"

      - name: Build
        run: bash gradlew build

      - name: List build artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la build/libs

      - name: Detect release jar
        id: detect-jar
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t jars < <(ls -1 build/libs/*.jar 2>/dev/null \
            | grep -Ev '(-sources|-javadoc|-dev|-shadow)\.jar$' \
            | sort)

          if [[ "${#jars[@]}" -eq 0 ]]; then
            echo "No release jar found in build/libs" >&2
            exit 1
          fi

          if [[ "${#jars[@]}" -gt 1 ]]; then
            echo "Multiple candidate jars found:" >&2
            printf '%s\n' "${jars[@]}" >&2
            exit 1
          fi

          echo "jar_path=${jars[0]}" >> "$GITHUB_OUTPUT"
          echo "Detected jar: ${jars[0]}"

      - name: Release (create or update) and upload asset
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} - ${{ steps.get-variables.outputs.minecraft_version }}
          files: |
            ${{ steps.detect-jar.outputs.jar_path }}
          fail_on_unmatched_files: true
