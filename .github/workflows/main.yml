name: Release

on:
  push:
    tags:
      - 'v*'

# Release 作成/更新 & asset アップロードに必要
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - run: git log -n 1

    - name: 'Get variables'
      id: get-variables
      shell: bash
      run: |
        set -euo pipefail

        # タグ実行なら v を外した値、そうでなければ短いSHA
        if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
          version="${GITHUB_REF#refs/tags/v}"
        else
          version="${GITHUB_SHA::7}"
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"

        # gradle.properties から minecraft_version を取得
        minecraft_version=$(perl -ne 'if (/^\s*minecraft_version\s*=\s*([0-9.]+)\s*$/) { print $1; exit }' gradle.properties)
        if [[ -z "${minecraft_version:-}" ]]; then
          echo "minecraft_version not found in gradle.properties" >&2
          exit 1
        fi
        echo "minecraft_version=$minecraft_version" >> "$GITHUB_OUTPUT"

        echo "Resolved version=$version, minecraft_version=$minecraft_version"

    - name: 'Build'
      run: bash gradlew build

    - name: 'List build artifacts'
      run: ls -la build/libs

    - name: 'Release (create or update) and upload asset'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }} - ${{ steps.get-variables.outputs.minecraft_version }}
        files: |
          build/libs/NotificationMod-${{ steps.get-variables.outputs.minecraft_version }}-${{ steps.get-variables.outputs.version }}.jar
        fail_on_unmatched_files: true
